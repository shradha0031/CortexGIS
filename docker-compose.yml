version: '3.8'

services:
  # CortexGIS Streamlit Application
  cortexgis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cortexgis
    ports:
      - "8501:8501"
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      PYTHONUNBUFFERED: "1"
      # Optional: LLM Configuration
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # VERTEXAI_PROJECT: ${VERTEXAI_PROJECT}
    volumes:
      # Mount outputs directory to host
      - ./outputs:/cortexgis/outputs
      - ./benchmark_results:/cortexgis/benchmark_results
      # Optional: Mount data directory for data sources
      - ./data:/cortexgis/data
    depends_on:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import streamlit"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL + PostGIS for spatial data
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cortexgis_postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexgis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortexgis_password}
      POSTGRES_DB: ${POSTGRES_DB:-cortexgis_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Initialize database with SQL scripts
      # - ./sql_init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortexgis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus Vector Database (optional, for RAG at scale)
  milvus:
    image: milvusdb/milvus:v0.3.11
    container_name: cortexgis_milvus
    environment:
      COMMON_STORAGETYPE: local
    ports:
      - "9091:9091"  # HTTP API
      - "19530:19530"  # gRPC API
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped
    profiles:
      - optional  # Enable with: docker-compose --profile optional up

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: cortexgis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - optional  # Enable with: docker-compose --profile optional up
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  milvus_data:
  redis_data:

# Usage:
# 1. Start services:
#    docker-compose up -d
#
# 2. Only Streamlit + PostgreSQL:
#    docker-compose up -d cortexgis postgres
#
# 3. Include optional services (Milvus, Redis):
#    docker-compose --profile optional up -d
#
# 4. Stop services:
#    docker-compose down
#
# 5. View logs:
#    docker-compose logs -f cortexgis
#    docker-compose logs -f postgres
#
# 6. Connect to PostgreSQL:
#    psql -h localhost -U cortexgis -d cortexgis_db
#
# Access CortexGIS UI:
#    http://localhost:8501
