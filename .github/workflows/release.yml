name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, etc.)

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: tag_name
        run: |
          echo "source_branch=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Changelog Reader
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          validation_depth: 0
          version: ${{ steps.tag_name.outputs.source_branch }}
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            # CortexGIS ${{ steps.tag_name.outputs.source_branch }}
            
            ${{ steps.changelog.outputs.changes }}
            
            ## Installation
            ```bash
            pip install cortexgis==${{ steps.tag_name.outputs.source_branch }}
            ```
            
            ## What's New
            - See [CHANGELOG.md](CHANGELOG.md) for detailed changes
            - See [README.md](README.md) for updated documentation
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
        continue-on-error: true

  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cortexgis:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/cortexgis:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
