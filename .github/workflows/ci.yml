name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly tests
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort mypy

      - name: Check code formatting with Black
        run: |
          black --check --diff planner/ executor/ rag/ data/ ui/ lib/ app/
        continue-on-error: true

      - name: Check import ordering with isort
        run: |
          isort --check-only planner/ executor/ rag/ data/ ui/ lib/ app/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          # Stop on critical errors (E9, F63, F7, F82)
          flake8 planner/ executor/ rag/ data/ ui/ lib/ app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit with warning for other issues
          flake8 planner/ executor/ rag/ data/ ui/ lib/ app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Type check with mypy
        run: |
          mypy planner/geospatial_planner.py executor/executor.py rag/rag_index.py --ignore-missing-imports || true
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.9', '3.11', '3.12' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests with pytest
        run: |
          pytest scripts/ --verbose --cov=planner --cov=executor --cov=rag --cov-report=xml --cov-report=term-missing --maxfail=3
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false
        continue-on-error: true

  validate-schemas:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Validate workflow schemas
        run: |
          python scripts/validate_workflows.py
          
      - name: Validate schema files
        run: |
          python -c "
          import json
          import jsonschema
          
          # Load schemas
          with open('schemas/workflow_schema.json') as f:
            workflow_schema = json.load(f)
          with open('schemas/gis_functions_schema.json') as f:
            functions_schema = json.load(f)
          
          # Validate workflow examples
          for workflow in ['workflows/flood_mapping.json', 'workflows/site_suitability.json']:
              with open(workflow) as f:
                  data = json.load(f)
              try:
                  jsonschema.validate(data, workflow_schema)
                  print(f'✓ {workflow}')
              except jsonschema.ValidationError as e:
                  print(f'✗ {workflow}: {e}')
                  exit(1)
          "

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cortexgis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cortexgis:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Security audit with Bandit
        run: |
          bandit -r planner/ executor/ rag/ data/ ui/ lib/ app/ -ll || true
        continue-on-error: true

      - name: Check dependencies with Safety
        run: |
          pip install -r requirements.txt
          safety check --json || true
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, validate-schemas]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: |
          python scripts/demo_integrated.py
          python scripts/validate_workflows.py
          python scripts/demo_planner.py
        continue-on-error: true

      - name: Verify installation
        run: |
          python -c "import streamlit; print(f'✓ Streamlit {streamlit.__version__}')"
          python -c "import jsonschema; print('✓ jsonschema')"
          python -c "import numpy; print(f'✓ NumPy {numpy.__version__}')"

  deploy-preview:
    name: Deploy Preview (Main Branch)
    runs-on: ubuntu-latest
    needs: [lint, test, validate-schemas]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Example: Deploy to Heroku
          # git push https://heroku:${{ secrets.HEROKU_API_KEY }}@git.heroku.com/${{ secrets.HEROKU_APP_NAME }}.git main
          echo "✓ Deployment would occur here (configure secrets in GitHub)"
        continue-on-error: true

  notification:
    name: Notification
    runs-on: ubuntu-latest
    needs: [lint, test, validate-schemas, integration-tests]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.validate-schemas.result }}" = "failure" ] || \
             [ "${{ needs.integration-tests.result }}" = "failure" ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=passed" >> $GITHUB_OUTPUT
          fi

      - name: Post to GitHub
        run: |
          echo "### CI/CD Pipeline Results 🔄" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Schema Validation | ${{ needs.validate-schemas.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add deployment link if main branch
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "### 🚀 [View Staged App](#)" >> $GITHUB_STEP_SUMMARY
          fi

# Cron jobs for additional automation
  security-scan-scheduled:
    name: Scheduled Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Run SAST scan with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/owasp-top-ten
        continue-on-error: true

      - name: Dependency check
        run: |
          pip install pip-audit
          pip-audit || true
        continue-on-error: true
