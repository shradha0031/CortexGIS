name: Dependency Updates

on:
  schedule:
    # Check for outdated dependencies weekly
    - cron: '0 9 * * MON'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Check & Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for outdated packages
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit poetry
          
          echo "### Outdated Packages" >> $GITHUB_STEP_SUMMARY
          pip list --outdated --format=json | python -m json.tool >> outdated.txt || true
          cat outdated.txt >> $GITHUB_STEP_SUMMARY

      - name: Run pip-audit
        run: |
          pip-audit --desc > audit-report.txt || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Audit Results" >> $GITHUB_STEP_SUMMARY
          cat audit-report.txt >> $GITHUB_STEP_SUMMARY

      - name: Suggest updates
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "ℹ️ To update dependencies:"
          echo "pip install --upgrade pip"
          echo "pip install --upgrade -r requirements.txt"

  # Automatically create PR for dependency updates with Dependabot (requires GitHub App)
  # Or use alternative: https://github.com/actions/dependabot-action
